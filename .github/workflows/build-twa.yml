        env:
          BUBBLEWRAP_NO_JDK_INSTALL: "1"
        run: |
          bubblewrap init \
            --manifest=https://yourdomain.com/manifest.json \
            --overwrite \
            --no-input

      - name: Build TWA APK
        run: |
          bubblewrap build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: thewall-web3-twa-apk
          path: ./output/*.apk

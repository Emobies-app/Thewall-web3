name: Build TWA APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap (FORCED NON-INTERACTIVE)
        run: |
          bubblewrap init \
            --manifest https://thewall.e-mobies.com/manifest.json \
            --directory twa-project \
            --skipPwaValidation \
            --useLocalJdk \
            --jdkPath $JAVA_HOME

      - name: Create Keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          keytool -genkey -v \
            -keystore twa-project/android.keystore \
            -alias thewall \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=Divin, OU=DwinUniverse, O=Dwin, L=Dubai, S=Dubai, C=AE"

      - name: Build APK & AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd twa-project
          bubblewrap build \
            --signingKeyPassword "$KEYSTORE_PASSWORD" \
            --signingKeyStorePassword "$KEYSTORE_PASSWORD"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: thewall-apk
          path: |
            twa-project/app-release-signed.apk
            twa-project/app-release-signed.aab

import 'dart:math' as math;
import 'package:flutter/material.dart';

class TheWallLogo extends StatelessWidget {
  final double size;
  const TheWallLogo({super.key, this.size = 200});

  @override
  Widget build(BuildContext context) {
    return CustomPaint(
      size: Size(size, size),
      painter: LogoPainter(),
    );
  }
}

class LogoPainter extends CustomPainter {
  @override
  void paint(Canvas canvas, Size size) {
    final center = Offset(size.width / 2, size.height / 2);
    final radius = size.width / 2.2;

    // 1. Draw the Hexagonal Shield Background (Violet/Purple)
    final shieldPaint = Paint()
      ..color = const Color(0xFF5E2B97) // Deep Violet
      ..style = PaintingStyle.fill;

    final hexagonPath = Path();
    for (int i = 0; i < 6; i++) {
      double angle = (i * 60) * math.pi / 180;
      double x = center.dx + radius * math.cos(angle);
      double y = center.dy + radius * math.sin(angle);
      if (i == 0) hexagonPath.moveTo(x, y);
      else hexagonPath.lineTo(x, y);
    }
    hexagonPath.close();
    canvas.drawPath(hexagonPath, shieldPaint);

    // 2. Draw "The Wall" Brick Pattern Overlay (Neon Cyan/Blue)
    final wallPaint = Paint()
      ..color = const Color(0xFF00E5FF).withOpacity(0.3)
      ..style = PaintingStyle.stroke
      ..strokeWidth = 2;

    // Simple brick grid clip
    canvas.save();
    canvas.clipPath(hexagonPath);
    for (double i = 0; i < size.height; i += size.height / 8) {
      canvas.drawLine(Offset(0, i), Offset(size.width, i), wallPaint);
    }
    canvas.restore();

    // 3. Draw Central Security Circle (Neon Green)
    final corePaint = Paint()
      ..color = const Color(0xFF00FF88) // Neon Green
      ..style = PaintingStyle.stroke
      ..strokeWidth = 4
      ..maskFilter = const MaskFilter.blur(BlurStyle.outer, 4); // Glow effect

    canvas.drawCircle(center, radius * 0.4, corePaint);
    
    // 4. Draw stylized 'W' in center
    final textPainter = TextPainter(
      text: const TextSpan(
        text: 'W',
        style: TextStyle(
          color: Colors.white,
          fontSize: 40,
          fontWeight: FontWeight.bold,
          fontFamily: 'monospace',
        ),
      ),
      textDirection: TextDirection.ltr,
    );
    textPainter.layout();
    textPainter.paint(canvas, center - Offset(textPainter.width/2, textPainter.height/2));
  }

  @override
  bool shouldRepaint(CustomPainter oldDelegate) => false;
}

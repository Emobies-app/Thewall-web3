name: Build TWA APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
      - run: npm install -g @bubblewrap/cli
      - run: bubblewrap init --manifest=https://thewall.e-mobies.com/manifest.json
      - run: bubblewrap build
      - uses: actions/upload-artifact@v3
        with:
          name: thewall-apk
          path: '*.apk'

name: Build TWA APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'MANIFEST'
          {
            "packageId": "com.dwin.thewall",
            "host": "thewall.e-mobies.com",
            "name": "TheWall",
            "launcherName": "TheWall",
            "display": "standalone",
            "themeColor": "#627eea",
            "navigationColor": "#060c1a",
            "backgroundColor": "#060c1a",
            "startUrl": "/",
            "iconUrl": "https://thewall.e-mobies.com/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "thewall.keystore",
              "alias": "thewall"
            },
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://thewall.e-mobies.com/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {},
            "enableNotifications": false,
            "orientation": "portrait",
            "fingerprints": []
          }
          MANIFEST

      - name: Create Keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          keytool -genkey -v \
            -keystore thewall.keystore \
            -alias thewall \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=Divin, OU=DwinUniverse, O=Dwin, L=Dubai, S=Dubai, C=AE"

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          bubblewrap build \
            --manifest twa-manifest.json \
            --signingKeyPassword "$KEYSTORE_PASSWORD" \
            --signingKeyStorePassword "$KEYSTORE_PASSWORD"

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: thewall-apk
          path: |
            app-release-signed.apk
            app-release-signed.aab

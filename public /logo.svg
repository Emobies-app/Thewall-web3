import 'dart:math' as math;
import 'package:flutter/material.dart';

class AnimatedTheWallLogo extends StatefulWidget {
  final double size;
  const AnimatedTheWallLogo({super.key, this.size = 200});

  @override
  State<AnimatedTheWallLogo> createState() => _AnimatedTheWallLogoState();
}

class _AnimatedTheWallLogoState extends State<AnimatedTheWallLogo>
    with SingleTickerProviderStateMixin {
  late AnimationController _controller;

  @override
  void initState() {
    super.initState();
    _controller = AnimationController(
      vsync: this,
      duration: const Duration(seconds: 2),
    )..repeat(reverse: true); // Creates the pulse effect
  }

  @override
  void dispose() {
    _controller.dispose();
    super.dispose();
  }

  @override
  Widget build(BuildContext context) {
    return AnimatedBuilder(
      animation: _controller,
      builder: (context, child) {
        return CustomPaint(
          size: Size(widget.size, widget.size),
          painter: AnimatedLogoPainter(pulseValue: _controller.value),
        );
      },
    );
  }
}

class AnimatedLogoPainter extends CustomPainter {
  final double pulseValue;
  AnimatedLogoPainter({required this.pulseValue});

  @override
  void paint(Canvas canvas, Size size) {
    final center = Offset(size.width / 2, size.height / 2);
    final radius = size.width / 2.2;

    // 1. Static Shield Background (Deep Night Violet)
    final shieldPaint = Paint()
      ..shader = const LinearGradient(
        colors: [Color(0xFF2E0A5E), Color(0xFF5E2B97)],
        begin: Alignment.topLeft,
        end: Alignment.bottomRight,
      ).createShader(Rect.fromLTWH(0, 0, size.width, size.height))
      ..style = PaintingStyle.fill;

    final hexagonPath = Path();
    for (int i = 0; i < 6; i++) {
      double angle = (i * 60) * math.pi / 180;
      double x = center.dx + radius * math.cos(angle);
      double y = center.dy + radius * math.sin(angle);
      if (i == 0) hexagonPath.moveTo(x, y);
      else hexagonPath.lineTo(x, y);
    }
    hexagonPath.close();
    canvas.drawPath(hexagonPath, shieldPaint);

    // 2. Pulsing Security Core (Neon Green)
    final pulseRadius = (radius * 0.35) + (pulseValue * 10);
    final corePaint = Paint()
      ..color = const Color(0xFF00FF88).withOpacity(0.8 - (pulseValue * 0.5))
      ..style = PaintingStyle.stroke
      ..strokeWidth = 3 + (pulseValue * 2)
      ..maskFilter = MaskFilter.blur(BlurStyle.outer, 5 + (pulseValue * 10));

    canvas.drawCircle(center, pulseRadius, corePaint);

    // 3. Central Logo Text 'W'
    final textPainter = TextPainter(
      text: TextSpan(
        text: 'W',
        style: TextStyle(
          color: Colors.white.withOpacity(0.9),
          fontSize: size.width * 0.2,
          fontWeight: FontWeight.w900,
          letterSpacing: -2,
        ),
      ),
      textDirection: TextDirection.ltr,
    );
    textPainter.layout();
    textPainter.paint(canvas, center - Offset(textPainter.width/2, textPainter.height/2));
  }

  @override
  bool shouldRepaint(covariant AnimatedLogoPainter oldDelegate) => 
      oldDelegate.pulseValue != pulseValue;
}
